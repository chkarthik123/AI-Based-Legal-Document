<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Client Registration | JUSTICE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: #f8f9fa;
        }
        .auth-card {
            background: #ffffff;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .auth-card h2 {
            font-weight: 600;
        }
        .form-control {
            height: 50px;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <a class="navbar-brand font-weight-bold text-primary" href="/">JUSTICE</a>
    <div class="ml-auto">
        <a href="/client" class="btn btn-outline-primary">Login</a>
    </div>
</nav>

<!-- PAGE HEADER -->
<div class="container-fluid bg-secondary text-white py-5 mb-5">
    <div class="container text-center">
        <h1 class="display-4 text-uppercase">Client Registration</h1>
        <p>Create your account to analyze legal documents</p>
    </div>
</div>

<!-- REGISTER FORM -->
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="auth-card">

                {% if msg %}
                    <div class="alert alert-danger text-center">
                        {{ msg }}
                    </div>
                {% endif %}

                <h2 class="text-center mb-4">Create Account</h2>

                <form action="/RegAction" method="post">

                    <div class="form-group">
                        <input type="text" name="name" class="form-control" placeholder="Full Name" required>
                    </div>

                    <div class="form-group">
                        <input type="email" name="email" class="form-control" placeholder="Email Address" required>
                    </div>

                    <div class="form-group">
                        <input type="number" name="mobile" class="form-control" placeholder="Mobile Number" required>
                    </div>

                    <div class="form-group">
                        <input type="text" name="address" class="form-control" placeholder="Address" required>
                    </div>

                    <div class="form-group">
                        <input type="text" name="uname" class="form-control" placeholder="Username" required>
                    </div>

                    <div class="form-group">
                        <input type="password" name="password" class="form-control" placeholder="Password" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block py-2">
                        Register
                    </button>

                </form>

                <div class="text-center mt-3">
                    Already have an account?
                    <a href="/client" class="text-primary font-weight-bold">Login</a>
                </div>

            </div>
        </div>
    </div>
</div>

<!-- FOOTER -->
<div class="container-fluid bg-secondary text-white text-center py-4 mt-5">
    <p class="mb-0">
        © 2026 <strong>AI-Based Legal Document Summarizer & Law Advisor</strong>
    </p>
    <small>Developed by SWTPT</small>
</div>

</body>
</html>
